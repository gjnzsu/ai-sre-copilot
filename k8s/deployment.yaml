apiVersion: apps/v1
kind: Deployment
metadata:
  name: log-anomaly-agent
  namespace: ai-sre
spec:
  replicas: 1
  selector:
    matchLabels:
      app: log-anomaly-agent
  template:
    metadata:
      labels:
        app: log-anomaly-agent
    spec:
      containers:
        - name: api
          image: your-registry/log-anomaly-agent:latest
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: log-anomaly-agent-config
            - secretRef:
                name: log-anomaly-agent-secret
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
